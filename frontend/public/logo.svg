<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Define path for top text -->
    <path id="topCurve" d="M 70,210 A 130,130 0 0,1 330,210" fill="none" />
    <!-- Define path for bottom text (reversed direction for upright reading) -->
    <path id="bottomCurve" d="M 340,190 A 140,140 0 0,1 60,190" fill="none" />
  </defs>

  <!-- Outer circle -->
  <circle cx="200" cy="200" r="190" fill="#ffffff" stroke="#1a2b4c" stroke-width="12" />
  
  <!-- Inner border -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#C084FC" stroke-width="3" stroke-dasharray="6 4" />

  <!-- Top Text -->
  <text font-family="Arial, sans-serif" font-weight="900" font-size="38" fill="#1a2b4c" letter-spacing="3">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">MALIK ARSHAD</textPath>
  </text>
  
  <!-- Bottom Text -->
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="26" fill="#1a2b4c" letter-spacing="1.5">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">REAL ESTATE &amp; BUILDERS</textPath>
  </text>

  <!-- Roof -->
  <path d="M 100,160 L 200,80 L 300,160" fill="none" stroke="#1a2b4c" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Roof Inner Layer -->
  <path d="M 120,160 L 200,95 L 280,160" fill="none" stroke="#C084FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- 4 Windows -->
  <rect x="180" y="130" width="16" height="16" fill="#C084FC" />
  <rect x="204" y="130" width="16" height="16" fill="#C084FC" />
  <rect x="180" y="154" width="16" height="16" fill="#C084FC" />
  <rect x="204" y="154" width="16" height="16" fill="#C084FC" />

  <!-- Stylized Handshake -->
  <path d="M 120,230 C 150,210 180,260 200,240 C 220,260 250,210 280,230" fill="none" stroke="#1a2b4c" stroke-width="18" stroke-linecap="round" />
  <path d="M 140,250 C 160,235 180,270 200,255 C 220,270 240,235 260,250" fill="none" stroke="#C084FC" stroke-width="12" stroke-linecap="round" />
</svg>
