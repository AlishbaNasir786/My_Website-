spring.application.name=backend
server.port=8080

# H2 Embedded Database (Zero-install development database)
spring.datasource.url=jdbc:h2:file:./data/realestate_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration
app.jwtSecret=MalikRealEstateRealEstatePlatformSuperSecretJWTKeyForHS512AlgorithmMustBe512BitsLongAtLeastSixtyFourCharactersLong2024!
app.jwtExpirationMs=86400000

# AI Configuration (Google Gemini)
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# File Upload Config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
