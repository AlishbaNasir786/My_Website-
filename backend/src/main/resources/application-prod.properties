# ============================================
# PRODUCTION PROFILE (Railway - PostgreSQL)
# ============================================
server.port=${PORT:8080}

# Database - Railway injects DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# JWT
app.jwtSecret=${JWT_SECRET:PrestigeEstateRealEstatePlatformSuperSecretJWTKeyForHS512AlgorithmMustBe512BitsLongAtLeastSixtyFourCharactersLong2024!}
app.jwtExpirationMs=86400000

# AI
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Storage path (Railway uses ephemeral storage - images won't persist after restart)
file.upload-dir=./uploads

# Logging
logging.level.root=WARN
logging.level.com.realestate=INFO
